      <button data-link="https://discord.com/users/258244908970672128" aria-label="Discord"><i class="fab fa-discord"></i></button>
    </div>
    <button id="playButton" class="music-button" aria-label="Toggle Music">

    <button class="bottom-right-button" data-link="https://yousif111.github.io/FeedBack/">

  <footer>
